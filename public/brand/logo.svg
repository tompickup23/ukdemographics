<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" fill="none">
  <!-- UK Demographics — Primary Horizontal Logo
       Population growth bars + trend line + wordmark.
       Bars show rising demographic scale. Trend line = projection trajectory. -->

  <!-- Population bars icon -->
  <rect x="8" y="48" width="12" height="26" rx="3" fill="#4f46e5"/>
  <rect x="24" y="34" width="12" height="40" rx="3" fill="#4f46e5" opacity="0.8"/>
  <rect x="40" y="22" width="12" height="52" rx="3" fill="#4f46e5" opacity="0.6"/>
  <rect x="56" y="10" width="12" height="64" rx="3" fill="#4f46e5" opacity="0.4"/>

  <!-- Trend line -->
  <path d="M14 46 L30 32 L46 20 L62 8" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="14" cy="46" r="3" fill="#818cf8"/>
  <circle cx="62" cy="8" r="3" fill="#10b981"/>

  <!-- Wordmark -->
  <text x="90" y="33" font-family="'Manrope', Inter, -apple-system, system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5" fill="#f5f7fb">
    UK
  </text>
  <text x="90" y="60" font-family="'Manrope', Inter, -apple-system, system-ui, sans-serif" font-size="22" font-weight="400" letter-spacing="4" fill="#91a7c4">
    DEMOGRAPHICS
  </text>

  <!-- Accent underline -->
  <rect x="90" y="66" width="180" height="2" rx="1" fill="#4f46e5"/>

  <!-- Tagline -->
  <text x="310" y="48" font-family="'Manrope', Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#91a7c4" letter-spacing="1">
    POPULATION DATA FOR EVERY COMMUNITY
  </text>
</svg>
